<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COLONY</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="flash-overlay" id="flashOverlay"></div>

  <div class="shell">

    <div class="status-bar">
      <span class="wordmark">COLONY//FEED</span>
      <div class="ws-indicator">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">offline</span>
      </div>
    </div>

    <!-- Nav -->
    <div class="nav-bar">
      <button class="nav-btn active" data-page="pack">PACK</button>
      <button class="nav-btn" data-page="debug">DEBUG</button>
    </div>

    <!-- PAGE: Pack -->
    <div class="page" id="page-pack">

      <div class="screen" id="screen-pack">
        <div class="pack-scene">
          <div id="packStack" class="pack-stack"></div>
          <div class="pack" id="pack">
            <div class="pack-front">
              <div class="pack-logo">◈</div>
              <div class="pack-title">RESOURCE PACK</div>
              <div class="pack-subtitle">4 cards inside</div>
              <div class="pack-sheen"></div>
              <div class="swipe-zone-indicator">← swipe to open →</div>
            </div>
          </div>
        </div>
        <p class="pack-hint">swipe left or right at the top</p>
      </div>

      <div class="screen hidden" id="screen-reveal">
        <div id="revealPeekStack" class="reveal-peek-stack"></div>
        <div class="reveal-header">
          <span class="reveal-counter" id="revealCounter">1 / 4</span>
        </div>
        <div class="rev-card" id="revealCard"></div>
        <div class="reveal-hint" id="revealHint">tap to reveal next</div>
      </div>

      <div class="screen hidden" id="screen-choose">
        <div class="choose-header">
          <span class="choose-title">CHOOSE A RESOURCE</span>
          <span class="choose-sub">feed your colony</span>
        </div>
        <div class="choice-grid" id="choiceGrid"></div>
      </div>

      <div class="screen hidden" id="screen-dropped">
        <div class="dropped-wrapper">
          <div class="dropped-icon">⬇</div>
          <div class="dropped-text">RESOURCE DROPPED</div>
          <div class="dropped-sub" id="droppedSub"></div>
          <button class="again-btn" id="againBtn">OPEN ANOTHER PACK</button>
        </div>
      </div>

    </div>

    <!-- PAGE: Debug -->
    <div class="page hidden" id="page-debug">
      <div class="debug-header">
        <span class="debug-title">DEBUG CONTROLS</span>
        <span class="debug-sub">spawn resources directly</span>
      </div>

      <div class="debug-grid">

        <button class="debug-card" data-command="spawn_small_cube" data-rarity="common">
          <div class="debug-shape-wrap">
            <div class="shape-small-cube debug-shape-el"></div>
          </div>
          <span class="debug-card-name">Small Cube</span>
          <span class="debug-card-rarity">common</span>
        </button>

        <button class="debug-card" data-command="spawn_large_cube" data-rarity="uncommon">
          <div class="debug-shape-wrap">
            <div class="shape-large-cube debug-shape-el"></div>
          </div>
          <span class="debug-card-name">Large Cube</span>
          <span class="debug-card-rarity">uncommon</span>
        </button>

        <button class="debug-card" data-command="spawn_sphere" data-rarity="rare">
          <div class="debug-shape-wrap">
            <div class="shape-sphere debug-shape-el"></div>
          </div>
          <span class="debug-card-name">Sphere</span>
          <span class="debug-card-rarity">rare</span>
        </button>

        <button class="debug-card" data-command="spawn_triangle" data-rarity="legendary">
          <div class="debug-shape-wrap">
            <div class="shape-triangle debug-shape-el"></div>
          </div>
          <span class="debug-card-name">Obelisk</span>
          <span class="debug-card-rarity">legendary</span>
        </button>

      </div>

      <div class="debug-log-wrap">
        <div class="debug-log-label">COMMAND LOG</div>
        <div class="debug-log" id="debugLog">
          <span class="debug-log-empty">no commands sent yet</span>
        </div>
      </div>

    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
