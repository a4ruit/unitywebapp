<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>COLONY</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <div class="shell">

    <div class="status-bar">
      <span class="wordmark">COLONY//FEED</span>
      <div class="ws-indicator">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">offline</span>
      </div>
    </div>

    <!-- SCREEN 1: Pack -->
    <div class="screen" id="screen-pack">
      <div class="pack-wrapper">
        <div class="pack" id="pack">
          <div class="pack-inner">
            <div class="pack-front">
              <div class="pack-logo">◈</div>
              <div class="pack-title">RESOURCE PACK</div>
              <div class="pack-subtitle">4 cards inside</div>
              <div class="pack-sheen"></div>
            </div>
          </div>
        </div>
        <p class="pack-hint" id="swipeHint">swipe up to open</p>
      </div>
    </div>

    <!-- SCREEN 2: One-by-one reveal -->
    <div class="screen hidden" id="screen-reveal">
      <div class="reveal-counter" id="revealCounter">1 / 4</div>
      <div class="reveal-card" id="revealCard"></div>
      <div class="reveal-tap-hint" id="revealTap">tap to continue</div>
    </div>

    <!-- SCREEN 3: Dropped -->
    <div class="screen hidden" id="screen-dropped">
      <div class="dropped-wrapper">
        <div class="dropped-icon">⬇</div>
        <div class="dropped-text">RESOURCE DROPPED</div>
        <div class="dropped-sub" id="droppedSub"></div>
        <button class="again-btn" id="againBtn">OPEN ANOTHER PACK</button>
      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
