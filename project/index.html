<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HELD</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="transition-overlay" id="overlay"></div>

  <div class="shell">

    <div class="status-bar">
      <span class="wordmark">HELD</span>
      <div class="ws-indicator">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">offline</span>
      </div>
    </div>

    <div class="hero">
      <h1 class="hero-title"></h1>
      <p class="hero-subtitle"></p>
    </div>

    <div class="app-grid">

      <div class="app-card" data-app="held" data-camera="CAMERA_1" data-label="Held, Instantaneously">
        <div class="badge"></div>
        <div class="app-icon"></div>
        <span class="app-name">Held</span>
        <span class="app-tag">Dating</span>
      </div>

      <div class="app-card" data-app="archive" data-camera="CAMERA_2" data-label="ArchiveGram">
        <div class="app-icon"></div>
        <span class="app-name">ArchiveGram</span>
        <span class="app-tag">Archive</span>
      </div>

      <div class="app-card" data-app="portals" data-camera="CAMERA_3" data-label="PORTALS">
        <div class="app-icon"></div>
        <span class="app-name">PORTALS</span>
        <span class="app-tag">Surveillance</span>
      </div>

      <div class="app-card" data-app="unknown" data-camera="CAMERA_4" data-label="???">
        <div class="app-icon">◻</div>
        <span class="app-name">???</span>
        <span class="app-tag">Soon</span>
      </div>

    </div>

    <span class="bottom-hint">tap to enter</span>

  </div>

  <script src="js/main.js"></script>

</body>
</html>
